spring:
  application:
    name: fumigation-approval
  datasource:
    url: jdbc:h2:mem:fumigationdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

server:
  port: 18080

fumigation:
  max-pesticide-dosage: 50
  required-ventilation-hours: 4
  allowable-gas-concentration: 0.5

springfox:
  documentation:
    enabled: true
